<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thryvenex</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111;
    }

    .container {
      max-width: 1100px;
      margin: 80px auto;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 50px;
    }

    .left {
      flex: 1;
    }

    .right {
      flex: 1;
      text-align: right;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #555;
      margin-bottom: 20px;
    }

    .company {
      font-size: 14px;
      color: #777;
      margin-bottom: 30px;
    }

    .contact {
      margin-top: 20px;
      font-size: 15px;
    }

    a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    .hero-img {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        text-align: center;
      }

      .right {
        text-align: center;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE (TEXT) -->
    <div class="left">
      <h1>Thryvenex</h1>

      <div class="subtitle">
        Building modern digital experiences.
      </div>

      <div class="company">
        Thryvenex Holdings LLC
      </div>

      <div class="contact">
        Contact: <a href="mailto:support@thryvenex.com">support@thryvenex.com</a>
      </div>
    </div>

    <!-- RIGHT SIDE (IMAGE) -->
    <div class="right">
      <img src="laptop.jpg" class="hero-img" alt="Preview">
    </div>

  </div>

</body>
</html>
