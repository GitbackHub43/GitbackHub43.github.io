<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thryvenex</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #ffffff;
      color: #111;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 80px auto;
      padding: 20px;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin-bottom: 30px;
    }

    .hero-img {
      width: 100%;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-top: 20px;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: #888;
    }

    a {
      color: #000;
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="Thryvenex Logo">

    <!-- TITLE -->
    <h1>Thryvenex</h1>

    <!-- SUBTEXT -->
    <p>Building modern digital experiences.</p>

    <!-- HERO IMAGE -->
    <img src="laptop.jpg" class="hero-img" alt="Preview">

    <!-- FOOTER -->
    <div class="footer">
      Contact: <a href="mailto:support@thryvenex.com">support@thryvenex.com</a>
    </div>

  </div>

</body>
</html>
